<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VULTURE RUN - Environment Inspector</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0c0c14;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Loading Overlay with Blurred Background Image */
        #loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-in-out, visibility 1s;
            background-color: #0c0c14;
        }
        #loader-bg {
            position: absolute;
            top: -20px;
            left: -20px;
            width: calc(100% + 40px);
            height: calc(100% + 40px);
            background-image: url('Gemini_Generated_Image_qad2wkqad2wkqad2.png');
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.4);
            z-index: 1;
        }
        #loader-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #ffffff;
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 242, 0.6);
            font-weight: 900;
            animation: pulse 2s infinite alternate;
        }
        p {
            font-size: 1rem;
            letter-spacing: 3px;
            color: #8a99ad;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .spinner-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 20px auto;
        }
        .spinner {
            width: 100%;
            height: 100%;
            border: 4px solid rgba(0, 255, 242, 0.1);
            border-top-color: #00fff2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .spinner-inner {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 0, 128, 0.1);
            border-bottom-color: #ff0080;
            border-radius: 50%;
            animation: spin-reverse 1.5s linear infinite;
        }
        #status-text {
            font-family: monospace;
            font-size: 0.9rem;
            color: #00fff2;
            text-shadow: 0 0 10px rgba(0, 255, 242, 0.4);
        }
        /* UI Overlay for controls info */
        #ui-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            background: rgba(12, 12, 20, 0.85);
            border: 1px solid rgba(0, 255, 242, 0.2);
            padding: 15px 30px;
            border-radius: 30px;
            color: #ffffff;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 15px rgba(0, 255, 242, 0.1);
            display: flex;
            gap: 20px;
            align-items: center;
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        .ui-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ui-icon {
            width: 8px;
            height: 8px;
            background-color: #ff0080;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff0080;
        }
        .ui-icon.cyan {
            background-color: #00fff2;
            box-shadow: 0 0 8px #00fff2;
        }
        #fallback-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 5;
            background: rgba(255, 0, 80, 0.2);
            border: 1px solid #ff0050;
            color: #ff0050;
            padding: 8px 15px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 4px;
            display: none;
            box-shadow: 0 0 15px rgba(255, 0, 80, 0.3);
            animation: blink 2s infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes spin-reverse {
            to { transform: rotate(-360deg); }
        }
        @keyframes pulse {
            from { transform: scale(0.98); text-shadow: 0 0 15px rgba(0, 255, 242, 0.5); }
            to { transform: scale(1.02); text-shadow: 0 0 30px rgba(0, 255, 242, 0.8), 0 0 10px rgba(255, 0, 128, 0.6); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div id="loader-bg"></div>
        <div id="loader-content">
            <h1>VULTURE RUN</h1>
            <p>Environment Compiler Phase</p>
            <div class="spinner-container">
                <div class="spinner"></div>
                <div class="spinner-inner"></div>
            </div>
            <div id="status-text">Initializing Engine...</div>
        </div>
    </div>

    <div id="fallback-badge">Fallback Grid Active</div>

    <div id="ui-panel">
        <div class="ui-item"><span class="ui-icon"></span>Drag to Rotate</div>
        <div class="ui-item"><span class="ui-icon cyan"></span>Scroll to Zoom</div>
        <div class="ui-item"><span class="ui-icon"></span>Right-Click to Pan</div>
    </div>

    <div id="canvas-container"></div>

    <!-- Include Three.js and dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // --- Application Architecture & Pipeline ---
        let scene, camera, renderer, controls;
        let mainModel = null;
        let isFallbackActive = false;
        
        const container = document.getElementById('canvas-container');
        const loaderOverlay = document.getElementById('loader-overlay');
        const statusText = document.getElementById('status-text');
        const uiPanel = document.getElementById('ui-panel');
        const fallbackBadge = document.getElementById('fallback-badge');

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0c0c14);
            scene.fog = new THREE.FogExp2(0x0c0c14, 0.002);

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 50, 100);

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            // 4. Orbit Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = true;
            controls.maxPolarAngle = Math.PI / 2 - 0.02; // Don't go below ground
            controls.minDistance = 2;
            controls.maxDistance = 800;

            // 5. Lighting Setup
            setupLighting();

            // 6. Handle Resize
            window.addEventListener('resize', onWindowResize);

            // 7. Load Asset
            loadEnvironment();

            // 8. Start Loop
            animate();
        }

        function setupLighting() {
            // Ambient Light: High intensity to bring out dark textures and photogrammetry details
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.8);
            scene.add(ambientLight);

            // Hemisphere Light for sky/ground gradients
            const hemiLight = new THREE.HemisphereLight(0x3a4f7c, 0x121224, 1.0);
            scene.add(hemiLight);

            // Directional Light 1: Primary Key Light
            const dirLight1 = new THREE.DirectionalLight(0x00fff2, 2.5);
            dirLight1.position.set(150, 200, 100);
            dirLight1.castShadow = true;
            dirLight1.shadow.mapSize.width = 2048;
            dirLight1.shadow.mapSize.height = 2048;
            dirLight1.shadow.camera.near = 0.5;
            dirLight1.shadow.camera.far = 1000;
            const d = 300;
            dirLight1.shadow.camera.left = -d;
            dirLight1.shadow.camera.right = d;
            dirLight1.shadow.camera.top = d;
            dirLight1.shadow.camera.bottom = -d;
            scene.add(dirLight1);

            // Directional Light 2: Opposing Fill Light
            const dirLight2 = new THREE.DirectionalLight(0xff0080, 2.0);
            dirLight2.position.set(-150, 150, -100);
            dirLight2.castShadow = true;
            scene.add(dirLight2);

            // Subtle neon point lights to add atmosphere
            const colors = [0x00fff2, 0xff0080, 0x00ff66];
            for(let i=0; i<3; i++) {
                const pl = new THREE.PointLight(colors[i], 3, 100);
                pl.position.set((i-1)*100, 20, (i-1)*50);
                scene.add(pl);
            }
        }

        function loadEnvironment() {
            statusText.textContent = "Loading highway_lnterchange_overpass.glb...";
            const loader = new THREE.GLTFLoader();

            loader.load(
                'highway_lnterchange_overpass.glb',
                // Success Callback
                function (gltf) {
                    mainModel = gltf.scene;
                    
                    // Optimize and enable shadows for loaded model
                    mainModel.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            
                            // Enhance materials if they exist
                            if(child.material) {
                                child.material.roughness = Math.max(child.material.roughness, 0.4);
                                child.material.metalness = Math.min(child.material.metalness, 0.8);
                            }
                        }
                    });

                    scene.add(mainModel);
                    
                    // Frame the model perfectly in viewport
                    focusCameraOnModel(mainModel);
                    
                    hideLoader();
                },
                // Progress Callback
                function (xhr) {
                    if (xhr.total > 0) {
                        const percent = Math.round((xhr.loaded / xhr.total) * 100);
                        statusText.textContent = `Downloading environment: ${percent}%`;
                    }
                },
                // Error Callback
                function (error) {
                    console.warn("Primary GLTF asset failed to load. Initializing beautiful fallback cyber-grid...", error);
                    statusText.textContent = "Error loading primary asset. Initializing Cyber-Grid fallback...";
                    setTimeout(activateFallbackEnvironment, 1000);
                }
            );
        }

        function focusCameraOnModel(model) {
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
            
            // Offset camera slightly for dynamic view
            camera.position.set(center.x + maxDim * 0.7, center.y + maxDim * 0.4, center.z + maxDim * 0.7);
            camera.lookAt(center);
            
            controls.target.copy(center);
            controls.maxDistance = maxDim * 4;
            controls.update();
        }

        function activateFallbackEnvironment() {
            isFallbackActive = true;
            fallbackBadge.style.display = "block";

            // Create Infinite Neon Cyber-Grid
            const gridHelper = new THREE.GridHelper(1000, 100, 0xff0080, 0x00fff2);
            gridHelper.position.y = -0.5;
            scene.add(gridHelper);

            // Create a custom glowing road bed
            const roadGeo = new THREE.PlaneGeometry(60, 1000);
            const roadMat = new THREE.MeshStandardMaterial({
                color: 0x05050b,
                roughness: 0.2,
                metalness: 0.9,
                side: THREE.DoubleSide
            });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.y = -0.4;
            road.receiveShadow = true;
            scene.add(road);

            // Road side lines
            const lineGeoLeft = new THREE.BoxGeometry(0.5, 0.1, 1000);
            const lineGeoRight = new THREE.BoxGeometry(0.5, 0.1, 1000);
            const lineMatCyan = new THREE.MeshBasicMaterial({ color: 0x00fff2 });
            const lineMatPink = new THREE.MeshBasicMaterial({ color: 0xff0080 });

            const lineLeft = new THREE.Mesh(lineGeoLeft, lineMatCyan);
            lineLeft.position.set(-30, -0.3, 0);
            scene.add(lineLeft);

            const lineRight = new THREE.Mesh(lineGeoRight, lineMatPink);
            lineRight.position.set(30, -0.3, 0);
            scene.add(lineRight);

            // Tall Glowing Neon Cylinders along the borders
            const cylinderGeo = new THREE.CylinderGeometry(1, 1, 60, 16);
            
            for (let i = -500; i <= 500; i += 80) {
                if (i === 0) continue; // Skip center
                
                // Left Side (Cyan)
                const cylLeft = new THREE.Mesh(
                    cylinderGeo, 
                    new THREE.MeshStandardMaterial({ 
                        color: 0x00fff2, 
                        emissive: 0x00fff2, 
                        emissiveIntensity: 1.5,
                        roughness: 0.1 
                    })
                );
                cylLeft.position.set(-35, 30, i);
                scene.add(cylLeft);

                // Right Side (Pink)
                const cylRight = new THREE.Mesh(
                    cylinderGeo, 
                    new THREE.MeshStandardMaterial({ 
                        color: 0xff0080, 
                        emissive: 0xff0080, 
                        emissiveIntensity: 1.5,
                        roughness: 0.1 
                    })
                );
                cylRight.position.set(35, 30, i);
                scene.add(cylRight);
            }

            // Set camera to frame the neon track perfectly
            camera.position.set(0, 45, 120);
            controls.target.set(0, 10, 0);
            controls.update();

            hideLoader();
        }

        function hideLoader() {
            loaderOverlay.style.opacity = '0';
            loaderOverlay.style.visibility = 'hidden';
            setTimeout(() => {
                uiPanel.style.opacity = '1';
            }, 500);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Smoothly update controls
            controls.update();

            // Subtle rotation of fallback environment components if active
            if (isFallbackActive) {
                const time = Date.now() * 0.001;
                // Add a subtle wave or hover effect to lighting if wanted
            }

            renderer.render(scene, camera);
        }

        // Initialize application on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
